<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cinema - Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <nav class="p-6 border-b border-slate-800">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight text-blue-500 flex items-center">
                <img src="/icon.png" alt="Logo" class="h-8 w-8 mr-3 drop-shadow-md">
                MY CINEMA <span class="text-slate-500 text-sm font-normal ml-2">v{{ version }}</span>
            </h1>
            <div class="space-x-6">
                <a href="/" class="hover:text-blue-400 transition">Dashboard</a>
                <a href="/settings" class="hover:text-blue-400 transition">Paramètres</a>
            </div>
        </div>
    </nav>
    <main class="container mx-auto p-8 flex-grow">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="mb-6 p-4 rounded {% if category == 'error' or 'Erreur' in message %}bg-red-900/50 border border-red-500 text-red-200{% else %}bg-green-900/50 border border-green-500 text-green-200{% endif %}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
    <footer class="p-8 border-t border-slate-800 text-center text-slate-500 text-sm">
        My Cinema &copy; 2026 - Vibe Coding Experiment
    </footer>
</body>
</html>
