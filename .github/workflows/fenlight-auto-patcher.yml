name: Fen Light Auto LLM Updater

on:
  schedule:
    # Exécuter tous les jours à 03:00 UTC (à ajuster selon tes besoins)
    - cron: '0 3 * * *'
  workflow_dispatch: # Permet de le lancer manuellement depuis l'interface GitHub

jobs:
  llm-update-patcher:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai

      - name: Run LLM Updater Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/llm_updater.py

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code || echo "changes_detected=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: cpr
        if: steps.git-check.outputs.changes_detected == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "🤖 [Vibe Coding] Mise à jour des signatures de patch Fen Light"
          title: "🤖 Mise à jour automatique : Nouvelles signatures Fen Light détectées"
          body: "Mise à jour générée par Gemini et auto-validée."
          branch: "bot/update-fenlight-signatures"
          base: main
          delete-branch: true

      - name: Auto-merge Pull Request
        # S'exécute si une PR a bien été créée OU mise à jour
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Commande CLI GitHub pour fusionner la PR automatiquement (forcé via admin)
          gh pr merge --merge --admin "${{ steps.cpr.outputs.pull-request-number }}"
