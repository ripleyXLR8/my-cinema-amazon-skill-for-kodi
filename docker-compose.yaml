version: '3.8'

services:
  kodi-alexa-skill:
    # Pour utiliser l'image précompilée (comme dans ton XML) :
    image: ghcr.io/ripleyxlr8/my-cinema-amazon-skill-for-kodi:latest
    container_name: kodi-fenlight-alexa-skill
    restart: unless-stopped
    
    # --- CONFIGURATION RÉSEAU (BRIDGE) ---
    # On expose explicitement le port 5000
    ports:
      - "5000:5000"

    volumes:
      # Persistance des tokens Trakt
      - ./data:/app/data
      # Persistance des clés d'autorisation ADB
      - ./adb_keys:/root/.android
      
    environment:
      - TZ=Europe/Paris
      - PYTHONUNBUFFERED=1
      
      # --- SHIELD CONFIG ---
      - SHIELD_IP=192.168.1.x
      - SHIELD_MAC=AA:BB:CC:DD:EE:FF
      
      # --- KODI CONFIG ---
      - KODI_PORT=8080
      - KODI_USER=kodi
      - KODI_PASS=kodi
      
      # --- API KEYS & SÉCURITÉ ---
      - TMDB_API_KEY=your_tmdb_api_key
      - ALEXA_SKILL_ID=amzn1.ask.skill.xxxx-xxxx-xxxx-xxxx
      
      # --- TRAKT.TV ---
      - TRAKT_CLIENT_ID=your_trakt_client_id
      - TRAKT_ACCESS_TOKEN=your_trakt_access_token
      - TRAKT_REFRESH_TOKEN=your_trakt_refresh_token
      
      # --- TMDB HELPER PLAYERS ---
      - PLAYER_DEFAULT=fenlight_auto.json
      - PLAYER_SELECT=fenlight_select.json
      
      # --- DEBUG ---
      - DEBUG_MODE=false
      
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
